# ---------------------------------------------------------------------------
# Dev profile — SQLite file database
# ---------------------------------------------------------------------------
%dev.quarkus.datasource.db-kind=other
%dev.quarkus.datasource.jdbc.driver=org.sqlite.JDBC
%dev.quarkus.datasource.jdbc.url=jdbc:sqlite:./backlogr-dev.db
%dev.quarkus.hibernate-orm.dialect=org.hibernate.community.dialect.SQLiteDialect
%dev.quarkus.hibernate-orm.schema-management.strategy=none
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.hibernate-orm.log.sql=true

# ---------------------------------------------------------------------------
# Test profile — separate SQLite file, recreated on every run
# ---------------------------------------------------------------------------
%test.quarkus.datasource.db-kind=other
%test.quarkus.datasource.jdbc.driver=org.sqlite.JDBC
%test.quarkus.datasource.jdbc.url=jdbc:sqlite:./backlogr-test.db
%test.quarkus.hibernate-orm.dialect=org.hibernate.community.dialect.SQLiteDialect
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# ---------------------------------------------------------------------------
# JWT — RS256 signing with local key pair (replace keys for production)
# ---------------------------------------------------------------------------
%dev.mp.jwt.verify.publickey.location=publicKey.pem
%test.mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=backlogr
%dev.smallrye.jwt.sign.key.location=privateKey.pem
%test.smallrye.jwt.sign.key.location=privateKey.pem

# Prod: pass PEM content directly via environment variables (no file needed)
# JWT_PUBLIC_KEY  : full RSA public key PEM string
# JWT_PRIVATE_KEY : full RSA private key PEM string
%prod.mp.jwt.verify.publickey=${JWT_PUBLIC_KEY}
%prod.smallrye.jwt.sign.key=${JWT_PRIVATE_KEY}

# ---------------------------------------------------------------------------
# Jira OAuth 2.0 (3LO) — set via environment variables
# JIRA_OAUTH_CLIENT_ID     : OAuth app client ID from Atlassian developer console
# JIRA_OAUTH_CLIENT_SECRET : OAuth app client secret from Atlassian developer console
# JIRA_OAUTH_REDIRECT_URI  : must match the redirect URI registered in Atlassian
# ---------------------------------------------------------------------------
jira.oauth.client-id=${JIRA_OAUTH_CLIENT_ID:placeholder-client-id}
jira.oauth.client-secret=${JIRA_OAUTH_CLIENT_SECRET}
jira.oauth.redirect-uri=${JIRA_OAUTH_REDIRECT_URI:http://localhost:8080/api/v1/auth/jira/callback}

quarkus.rest-client.atlassian-auth.url=https://auth.atlassian.com
quarkus.rest-client.atlassian-api.url=https://api.atlassian.com

# ---------------------------------------------------------------------------
# Prod profile — PostgreSQL (configure via environment variables)
# ---------------------------------------------------------------------------
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.flyway.migrate-at-start=true
